services:
  liquor_web:
    build: .
    container_name: liquor_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120
    env_file:
      - .env
    volumes:
      - liquor_media:/app/media
    depends_on:
      liquor_db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8000"

  liquor_db:
    image: postgres:16-alpine
    container_name: liquor_db
    environment:
      POSTGRES_DB: registration
      POSTGRES_USER: registration
      POSTGRES_PASSWORD: ChangeThisStrongPassword123
    volumes:
      - liquor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registration -d registration"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  liquor_nginx:
    image: nginx:1.27-alpine
    container_name: liquor_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/liquor.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_challenge:/var/www/certbot
      - liquor_media:/app/media
    depends_on:
      - liquor_web
    restart: unless-stopped

  liquor_certbot:
    image: certbot/certbot:latest
    container_name: liquor_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_challenge:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  liquor_postgres_data:
  liquor_media:
  certbot_certs:
  certbot_challenge: