services:
  - type: web
    name: liquor-association-web
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    healthCheckPath: /
    disk:
      name: liquor-association-media
      mountPath: /app/media
      sizeGB: 1
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: liquor-association-db
          property: connectionString
      - key: ASSOCIATION_NAME
        value: Liquor Association
      - key: MEMBERSHIP_FEE
        value: "5000.00"
      - key: PAYMENT_UPI_ID
        sync: false
      - key: PAYMENT_BANK_NAME
        sync: false
      - key: PAYMENT_ACCOUNT_NAME
        sync: false
      - key: PAYMENT_ACCOUNT_NUMBER
        sync: false
      - key: PAYMENT_IFSC
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Liquor Association
      - key: SMTP_USE_SSL
        value: "True"
      - key: WHATSAPP_API_URL
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_FROM
        sync: false

databases:
  - name: liquor-association-db
    plan: starter
    databaseName: registration
    user: registration
