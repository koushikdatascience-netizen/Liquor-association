{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}{{ ASSOCIATION_NAME }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'wb/css/style.css' %}">
  <link rel="stylesheet" href="{% static 'wb/css/components.css' %}">
  <link rel="stylesheet" href="{% static 'wb/css/django.css' %}">
  <link rel="stylesheet" href="{% static 'wb/css/member.css' %}">
  <link rel="stylesheet" href="{% static 'wb/css/form-enhancements.css' %}">
  <link rel="stylesheet" href="{% static 'wb/css/responsive.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}
    {% include "includes/messages.html" %}
    <main>
      {% block content %}{% endblock %}
    </main>
    {% include "includes/footer.html" %}
  {% endblock %}
  <script src="{% static 'wb/js/app.js' %}"></script>
  <script src="{% static 'wb/js/navigation.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
