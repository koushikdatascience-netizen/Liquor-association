{% extends "base.html" %}
{% block title %}Application Form - {{ ASSOCIATION_NAME }}{% endblock %}
{% block content %}
<section class="panel">
  <h1>{% if is_update %}Update Documents{% else %}Membership Application Form{% endif %}</h1>
  <form method="post" enctype="multipart/form-data" class="form-grid columns">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Submit Application</button>
  </form>
</section>
{% endblock %}
