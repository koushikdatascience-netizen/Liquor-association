{% extends "base.html" %}
{% block title %}Apply - {{ ASSOCIATION_NAME }}{% endblock %}
{% block content %}
<div class="auth-split">
  <div class="auth-split-left">
    <div class="auth-card">
      <h2>Sign Up</h2>
      <p class="kicker">Create <b>account</b></p>
      <form method="post" class="form django-form">
        {% csrf_token %}
        {{ form.as_p }}
        <p class="small">No password is required. We will send an OTP to your email and WhatsApp.</p>
        <button class="btn btn-primary btn-block" type="submit">Create account & send OTP</button>
      </form>
      <p class="auth-alt">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
  </div>
  <div class="auth-split-right">
    <img src="https://westwardwhiskey.com/cdn/shop/files/NeatKitHexGlasses-lifestyle.png?v=1727212800&width=580" alt="Association welfare illustration">
  </div>
</div>
{% endblock %}
