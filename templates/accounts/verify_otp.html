{% extends "base.html" %}
{% block title %}Verify OTP - {{ ASSOCIATION_NAME }}{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Verify OTP</h1>
  <p class="muted">Enter the OTP sent to your registered email and WhatsApp/mobile number.</p>
  <form method="post" class="form-grid">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Verify Account</button>
  </form>
  <p class="muted"><a href="{% url 'resend_registration_otp' %}">Resend OTP</a></p>
</section>
{% endblock %}
