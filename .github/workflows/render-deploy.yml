name: CI and Render Deploy

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  django-checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: registration_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d registration_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/registration_ci
      SITE_URL: http://localhost
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      MEMBERSHIP_FEE: "5000.00"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run Django checks
        run: python manage.py check --deploy

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Trigger Render deploy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured. Skipping deploy."
            exit 0
          fi
          curl -fsS "$RENDER_DEPLOY_HOOK_URL"
