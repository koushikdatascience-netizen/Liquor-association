<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Upload Payment Proof — WBFL Association</title>
<link rel="icon" href="../favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="../assets/css/style.css"/>
<link rel="stylesheet" href="../assets/css/components.css"/>
<link rel="stylesheet" href="../assets/css/responsive.css"/>

</head><body>
<div class="portal">
  <div class="sidebar-backdrop"></div>
  <aside class="sidebar">
    <button class="sidebar-close" data-sidebar-close aria-label="Close menu"><i class="bi bi-x-lg"></i></button>
    <a href="../index.html" class="brand"><span class="brand-mark">W</span> WBFL Portal</a>
    <div class="side-section">Overview</div>
    <a href="../dashboard.html" class="side-link"><i class="bi bi-grid"></i> Dashboard</a>
    <a href="../member/notifications.html" class="side-link"><i class="bi bi-bell"></i> Notifications</a>
    <div class="side-section">Membership</div>
    <a href="../membership/step1.html" class="side-link"><i class="bi bi-file-earmark-text"></i> Application</a>
    <a href="../membership/status.html" class="side-link"><i class="bi bi-hourglass-split"></i> Status</a>
    <a href="../payment/payment.html" class="side-link active"><i class="bi bi-credit-card"></i> Payment</a>
    <a href="../member/membership-card.html" class="side-link"><i class="bi bi-person-vcard"></i> Membership Card</a>
    <div class="side-section">Account</div>
    <a href="../member/profile.html" class="side-link"><i class="bi bi-person"></i> Profile</a>
    <a href="../login.html" class="side-link"><i class="bi bi-box-arrow-right"></i> Sign out</a>
  </aside>
  <div class="portal-main">
    <header class="topbar">
      <div class="topbar-left"><button class="icon-btn" data-sidebar-toggle aria-label="Open menu"><i class="bi bi-list"></i></button>
      <div class="topbar-search"><i class="bi bi-search"></i><input placeholder="Search..." aria-label="Search"/></div></div>
      <div class="topbar-right"><a href="../member/notifications.html" class="icon-btn" aria-label="Notifications"><i class="bi bi-bell"></i><span class="dot-badge"></span></a><div class="avatar">AK</div></div>
    </header>
    <div class="page">
      <div class="breadcrumb"><a href="../dashboard.html">Home</a> <i class="bi bi-chevron-right"></i> Upload Payment</div>

      <div class="page-head">
        <div><h1 class="page-title">Upload payment proof</h1><p class="small mt-8">Attach a screenshot or receipt for the payment you made.</p></div>
      </div>
      <div class="card" style="max-width:640px">
        <div class="form">
          <div class="upload" data-target="paymentProof">
            <div class="upload-drop"><i class="bi bi-cloud-arrow-up" aria-hidden="true"></i>Drag &amp; drop or click to upload receipt / screenshot</div>
            <input type="file" accept="image/*,application/pdf" hidden/>
            <div class="upload-file" style="display:none"><i class="bi bi-file-earmark" aria-hidden="true"></i><span class="name"></span><span class="small size"></span><button class="rm" type="button" aria-label="Remove file"><i class="bi bi-x-lg" aria-hidden="true"></i></button></div>
          </div>
          <div class="form-row mt-16">
            <div class="field"><label for="txnId">Transaction / UTR number</label><input class="input" id="txnId" placeholder="e.g. 302981823123" required/></div>
            <div class="field"><label for="payMode">Payment mode</label><select class="select" id="payMode"><option>UPI</option><option>NEFT / RTGS</option><option>Cheque / DD</option></select></div>
          </div>
          <div class="field"><label for="payDate">Payment date</label><input class="input" id="payDate" type="date"/></div>
          <button class="btn btn-primary btn-block mt-16" id="submitPayment" type="button">Submit for verification <i class="bi bi-arrow-right" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/navigation.js"></script>
<script>document.getElementById("submitPayment")?.addEventListener("click",()=>{window.location.href="success.html";});</script>
</body></html>
