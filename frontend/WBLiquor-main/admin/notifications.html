<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Notifications — Liquor Society Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/style.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
<div class="app" id="app">

  <div class="page-head">
    <div>
      <h1>Send Notification</h1>
      <p class="subtitle">Broadcast circulars, reminders and alerts to members.</p>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:24px;">
    <div class="card">
      <div class="card__head"><div class="card__title">Compose</div></div>
      <div class="form-grid">
        <div class="field full">
          <label>Recipient</label>
          <div class="segmented">
            <button class="active">All Members</button>
            <button>District-wise</button>
            <button>Pending Applicants</button>
            <button>Individual</button>
          </div>
        </div>
        <div class="field">
          <label>Channel</label>
          <div style="display:flex;gap:16px;font-size:13px;">
            <label style="display:flex;gap:6px;align-items:center;"><input type="checkbox" checked /> Email</label>
            <label style="display:flex;gap:6px;align-items:center;"><input type="checkbox" /> WhatsApp</label>
            <label style="display:flex;gap:6px;align-items:center;"><input type="checkbox" /> SMS</label>
          </div>
        </div>
        <div class="field">
          <label>Priority</label>
          <select class="select"><option>Normal</option><option>Important</option><option>Urgent</option></select>
        </div>
        <div class="field full"><label>Subject</label><input class="input" placeholder="e.g. Renewal circular for FY 2026-27" /></div>
        <div class="field full">
          <label>Message</label>
          <div style="border:1px solid var(--border);border-radius:12px;">
            <div style="display:flex;gap:6px;padding:8px;border-bottom:1px solid var(--border);">
              <button class="icon-btn"><i class="bi bi-type-bold"></i></button>
              <button class="icon-btn"><i class="bi bi-type-italic"></i></button>
              <button class="icon-btn"><i class="bi bi-list-ul"></i></button>
              <button class="icon-btn"><i class="bi bi-link-45deg"></i></button>
              <button class="icon-btn"><i class="bi bi-paperclip"></i></button>
            </div>
            <textarea class="textarea" style="border:none;box-shadow:none;min-height:200px;" placeholder="Write your message here…"></textarea>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px;">
        <button class="btn"><i class="bi bi-eye"></i> Preview</button>
        <button class="btn"><i class="bi bi-clock"></i> Schedule</button>
        <button class="btn primary" style="margin-left:auto;" onclick="toast('Circular queued for 3,482 recipients','success')"><i class="bi bi-send"></i> Send now</button>
      </div>
    </div>

    <div class="card">
      <div class="card__head"><div class="card__title">Recent Broadcasts</div></div>
      <div class="timeline">
        <div class="item"><div class="ic blue"><i class="bi bi-envelope"></i></div><div><div class="t">Renewal reminder — FY 2026-27</div><div class="d">Email · 3,102 sent · 68% opened</div></div><div class="when">2 days ago</div></div>
        <div class="item"><div class="ic gold"><i class="bi bi-megaphone"></i></div><div><div class="t">AGM Notice</div><div class="d">Email · WhatsApp · 3,482 sent</div></div><div class="when">1 week ago</div></div>
        <div class="item"><div class="ic"><i class="bi bi-chat-dots"></i></div><div><div class="t">Excise policy update</div><div class="d">SMS · 3,412 sent</div></div><div class="when">3 weeks ago</div></div>
      </div>
    </div>
  </div>

</div>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/modal.js"></script>
<script src="assets/js/table.js"></script>
<script>
  mountShell({ page: "notifications", title: "Notifications", crumbs: [{ label: "Home", href: "dashboard.html" }] });
</script>
</body>
</html>
