<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Membership Card — Liquor Society Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/style.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
<div class="app" id="app">

  <div class="page-head">
    <div>
      <h1>Membership Card</h1>
      <p class="subtitle">Preview and issue a digital card for the member.</p>
    </div>
    <div class="page-actions">
      <button class="btn"><i class="bi bi-printer"></i> Print</button>
      <button class="btn"><i class="bi bi-image"></i> Download PNG</button>
      <button class="btn primary"><i class="bi bi-file-earmark-pdf"></i> Download PDF</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">
    <div class="card" style="display:grid;place-items:center;background:#fafafa;">
      <div class="mem-card">
        <div class="row">
          <div>
            <div class="brand">West Bengal FL &amp; IML Society</div>
            <div class="title">Membership Card</div>
          </div>
          <div class="brand" style="text-align:right;">2026 – 27</div>
        </div>
        <div class="num">MB · 3021</div>
        <div class="grid2">
          <div><div class="lbl">Member</div><div class="val">Suman Ghosh</div></div>
          <div><div class="lbl">Category</div><div class="val">Gold</div></div>
          <div><div class="lbl">Shop</div><div class="val">Suman Enterprise</div></div>
          <div><div class="lbl">District</div><div class="val">Kolkata</div></div>
          <div><div class="lbl">Valid Till</div><div class="val">31 Mar 2027</div></div>
          <div><div class="lbl">Issued</div><div class="val">06 Jul 2026</div></div>
        </div>
        <div class="gold-bar"></div>
        <div class="qr" aria-label="QR code"></div>
      </div>
    </div>

    <div class="card">
      <div class="card__head"><div class="card__title">Card Options</div></div>
      <div class="form-grid">
        <div class="field"><label>Member</label><select class="select"><option>Suman Ghosh · MB-3021</option><option>Arundhati Pal · MB-3020</option></select></div>
        <div class="field"><label>Category</label><select class="select"><option>Gold</option><option>Silver</option><option>Regular</option></select></div>
        <div class="field"><label>Valid from</label><input class="input" type="date" value="2026-04-01" /></div>
        <div class="field"><label>Valid till</label><input class="input" type="date" value="2027-03-31" /></div>
        <div class="field full"><label>Notes on card</label><textarea class="textarea" placeholder="Optional message printed on the back…"></textarea></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px;">
        <button class="btn"><i class="bi bi-arrow-clockwise"></i> Regenerate</button>
        <button class="btn primary" style="margin-left:auto;" onclick="toast('Card issued & emailed','success')"><i class="bi bi-send"></i> Issue &amp; Email</button>
      </div>
    </div>
  </div>

</div>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/modal.js"></script>
<script src="assets/js/table.js"></script>
<script>
  mountShell({ page: "cards", title: "Membership Cards", crumbs: [{ label: "Home", href: "dashboard.html" }] });
</script>
</body>
</html>
