# ============================================================================
# wbliquorsocity.com — Liquor Association membership portal
# Deploy: copy to /etc/nginx/sites-available/wbliquorsocity and symlink:
#   sudo ln -s /etc/nginx/sites-available/wbliquorsocity /etc/nginx/sites-enabled/
# Then run: sudo certbot --nginx -d wbliquorsocity.com -d www.wbliquorsocity.com \
#                     -d admin.wbliquorsocity.com -d member.wbliquorsocity.com
# certbot will add the 443 ssl blocks + cert paths and reload nginx automatically.
# This file intentionally listens on 80 only; do NOT add default_server
# (that is owned by the socialsync site).
# ============================================================================

# ---- Main site ----
server {
    listen 80;
    server_name wbliquorsocity.com www.wbliquorsocity.com;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Admin portal ----
server {
    listen 80;
    server_name admin.wbliquorsocity.com;

    location = / {
        return 301 https://admin.wbliquorsocity.com/admin/dashboard/;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Member portal ----
server {
    listen 80;
    server_name member.wbliquorsocity.com;

    location = / {
        return 301 https://member.wbliquorsocity.com/dashboard/;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}