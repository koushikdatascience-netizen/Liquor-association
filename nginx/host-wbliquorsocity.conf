# ============================================================================
# wbliquorsocity.com — WB Foreign Liquor and IML Licensees
#   - Main domain (wbliquorsocity.com / www)  -> website + full app
#   - login.wbliquorsocity.com                -> member & admin login portal
# Deploy: copy to /etc/nginx/sites-available/wbliquorsocity and symlink:
#   sudo ln -s /etc/nginx/sites-available/wbliquorsocity /etc/nginx/sites-enabled/
# Then run: sudo certbot --nginx -d wbliquorsocity.com -d www.wbliquorsocity.com \
#                     -d login.wbliquorsocity.com
# certbot will add the 443 ssl blocks + cert paths and reload nginx automatically.
# This file intentionally listens on 80 only; do NOT add default_server
# (that is owned by the socialsync site).
# ============================================================================

# ---- Main website + application ----
server {
    listen 80;
    server_name wbliquorsocity.com www.wbliquorsocity.com;

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        types { application/pdf pdf; }
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Login portal (member + admin) ----
server {
    listen 80;
    server_name login.wbliquorsocity.com;

    location = / {
        return 301 https://login.wbliquorsocity.com/accounts/login/;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        types { application/pdf pdf; }
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}