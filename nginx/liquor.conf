# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name wbliquorsocity.com www.wbliquorsocity.com admin.wbliquorsocity.com member.wbliquorsocity.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main site
server {
    listen 443 ssl;
    server_name wbliquorsocity.com www.wbliquorsocity.com;

    ssl_certificate /etc/letsencrypt/live/wbliquorsocity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wbliquorsocity.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://liquor_web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin portal
server {
    listen 443 ssl;
    server_name admin.wbliquorsocity.com;

    ssl_certificate /etc/letsencrypt/live/wbliquorsocity.com/fullchain.pem;
